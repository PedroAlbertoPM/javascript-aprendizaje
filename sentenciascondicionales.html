function clasificarValor(valor) {
if (valor % 2 === 0) {
    console.log("Divisible entre 2");
} else if (valor % 3 == 0) {
    console.log("Divisible entre 3");
} else {
    console.log("No es divisible entre las opciones");
}
}

//condicionales orden logico

function clasificarValor1(valor){
  if (valor < 5) {
    console.log(`El número ${valor} es menor que 5.`);
  } else if (valor < 10) {
    console.log(`El número ${valor} es menor que 10.`);
  }  else {
    console.log(`El número ${valor} es mayor o igual a 10.`);
  }
}

clasificarValor1(15); // Resultado: El número 15 es mayor o igual a 10.
